  "apikey": SB_KEY,
  "Authorization": "Bearer " + SB_KEY,
  "Content-Type": "application/json",
  "Prefer": "resolution=merge-duplicates"
};

const db = {
  loadAll: async function() {
    try {
      const r = await fetch(SB_URL + "/rest/v1/logos?select=course_id,data", { headers: SB_HEADERS });
      if (!r.ok) return {};
      const rows = await r.json();
      const result = {};
      rows.forEach(function(row) { result[row.course_id] = row.data; });
      return result;
    } catch(e) { return {}; }
  },
  save: async function(id, dataUrl) {
    try {
      const r = await fetch(SB_URL + "/rest/v1/logos", {
        method: "POST",
        headers: SB_HEADERS,
        body: JSON.stringify({ course_id: id, data: dataUrl })
      });
      if (!r.ok) {
        const txt = await r.text();
        console.error("Supabase save failed:", r.status, txt);
      }
    } catch(e) { console.error("Supabase network error:", e.message); }
  },
  remove: async function(id) {
    try {
      await fetch(SB_URL + "/rest/v1/logos?course_id=eq." + id, {
        method: "DELETE",
        headers: SB_HEADERS
      });
    } catch(e) {}
  }
};

  width: 100%; display: flex; align-items: center;

/* ═══════════════════════════════════════════════════════
   AUDIO ENGINE — authentic golf sounds via Web Audio API
═══════════════════════════════════════════════════════ */
let _audioCtx = null;
function ctx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === "suspended") _audioCtx.resume();
  return _audioCtx;
}

// Crisp iron strike: sharp transient impact + metallic ring + brief ball-flight hiss
function playClick() {
  try {
    const c = ctx(), t = c.currentTime, sr = c.sampleRate;

    // ── Impact transient (8ms of shaped noise — the "tock" of clubface)
    const impLen = Math.floor(sr * 0.009);
    const impBuf = c.createBuffer(1, impLen, sr);
    const impD = impBuf.getChannelData(0);
    for (let i = 0; i < impLen; i++) {
      const env = Math.pow(1 - i / impLen, 1.6);
      impD[i] = (Math.random() * 2 - 1) * env;
    }
    const imp = c.createBufferSource(); imp.buffer = impBuf;
    const impFilt = c.createBiquadFilter(); impFilt.type = "bandpass";
    impFilt.frequency.value = 4200; impFilt.Q.value = 0.7;
    const impG = c.createGain(); impG.gain.setValueAtTime(0.75, t);
    imp.connect(impFilt); impFilt.connect(impG); impG.connect(c.destination);
    imp.start(t);

    // ── Metallic ring — iron face resonance (high chirp sweeping down)
    const ring = c.createOscillator(); ring.type = "sine";
    const ringG = c.createGain();
    ring.frequency.setValueAtTime(3200, t);
    ring.frequency.exponentialRampToValueAtTime(1600, t + 0.06);
    ring.frequency.exponentialRampToValueAtTime(800,  t + 0.16);
    ringG.gain.setValueAtTime(0.14, t);
    ringG.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    ring.connect(ringG); ringG.connect(c.destination);
    ring.start(t); ring.stop(t + 0.2);

    // ── Low body thud (the feel of the strike)
    const body = c.createOscillator(); body.type = "triangle";
    const bodyG = c.createGain();
    body.frequency.setValueAtTime(380, t);
    body.frequency.exponentialRampToValueAtTime(180, t + 0.09);
    bodyG.gain.setValueAtTime(0.10, t);
    bodyG.gain.exponentialRampToValueAtTime(0.001, t + 0.11);
    body.connect(bodyG); bodyG.connect(c.destination);
    body.start(t); body.stop(t + 0.13);

    // ── Ball-flight hiss (very faint, fades in after impact)
    const hissLen = Math.floor(sr * 0.18);
    const hissBuf = c.createBuffer(1, hissLen, sr);
    const hissD = hissBuf.getChannelData(0);
    for (let i = 0; i < hissLen; i++) {
      const env = (i / hissLen) * Math.pow(1 - i / hissLen, 2.0);
      hissD[i] = (Math.random() * 2 - 1) * env;
    }
    const hiss = c.createBufferSource(); hiss.buffer = hissBuf;
    const hissFilt = c.createBiquadFilter(); hissFilt.type = "highpass"; hissFilt.frequency.value = 5000;
    const hissG = c.createGain(); hissG.gain.setValueAtTime(0.07, t + 0.01);
    hiss.connect(hissFilt); hissFilt.connect(hissG); hissG.connect(c.destination);
    hiss.start(t + 0.01);
  } catch(_) {}
}

// Ball dropping into cup: hollow "tok" on edge, then the iconic rattle-settle
function playCupIn() {
  try {
    const c = ctx(), t = c.currentTime, sr = c.sampleRate;

    // ── First contact — ball hits cup edge (hollow, wooden-plastic quality)
    const tok1 = c.createOscillator(); tok1.type = "sine";
    const tok1G = c.createGain();
    tok1.frequency.setValueAtTime(560, t);
    tok1.frequency.exponentialRampToValueAtTime(290, t + 0.09);
    tok1G.gain.setValueAtTime(0.28, t);
    tok1G.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    tok1.connect(tok1G); tok1G.connect(c.destination);
    tok1.start(t); tok1.stop(t + 0.16);

    // Second harmonic for richness
    const tok1b = c.createOscillator(); tok1b.type = "sine";
    const tok1bG = c.createGain();
    tok1b.frequency.setValueAtTime(1120, t);
    tok1b.frequency.exponentialRampToValueAtTime(580, t + 0.07);
    tok1bG.gain.setValueAtTime(0.09, t);
    tok1bG.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
    tok1b.connect(tok1bG); tok1bG.connect(c.destination);
    tok1b.start(t); tok1b.stop(t + 0.1);

    // ── Bottom of cup impact (slightly lower, 85ms later)
    const tok2 = c.createOscillator(); tok2.type = "sine";
    const tok2G = c.createGain();
    tok2.frequency.setValueAtTime(420, t + 0.085);
    tok2.frequency.exponentialRampToValueAtTime(200, t + 0.085 + 0.1);
    tok2G.gain.setValueAtTime(0.22, t + 0.085);
    tok2G.gain.exponentialRampToValueAtTime(0.001, t + 0.085 + 0.16);
    tok2.connect(tok2G); tok2G.connect(c.destination);
    tok2.start(t + 0.085); tok2.stop(t + 0.28);

    // ── Rattle/settle — the ball rolling around the cup bottom
    const rattleLen = Math.floor(sr * 0.22);
    const rattleBuf = c.createBuffer(1, rattleLen, sr);
    const rattleD = rattleBuf.getChannelData(0);
    for (let i = 0; i < rattleLen; i++) {
      // Bursting, irregular — simulates ball bouncing inside
      const burst = Math.sin(i * 0.004) * Math.sin(i * 0.017) * Math.sin(i * 0.031);
      const env = Math.pow(1 - i / rattleLen, 1.2);
      rattleD[i] = (Math.random() * 2 - 1) * Math.abs(burst) * env * 0.9;
    }
    const rattle = c.createBufferSource(); rattle.buffer = rattleBuf;
    const rattleFilt = c.createBiquadFilter(); rattleFilt.type = "bandpass";
    rattleFilt.frequency.value = 1400; rattleFilt.Q.value = 1.8;
    const rattleG = c.createGain();
    rattleG.gain.setValueAtTime(0.22, t + 0.16);
    rattleG.gain.exponentialRampToValueAtTime(0.001, t + 0.44);
    rattle.connect(rattleFilt); rattleFilt.connect(rattleG); rattleG.connect(c.destination);
    rattle.start(t + 0.16);
  } catch(_) {}
}

// Sand explosion: burst of shaped noise = ball hitting a bunker
function playWrong() {
  try {
    const c = ctx(), t = c.currentTime, sr = c.sampleRate;

    // ── Sandy explosion — shaped noise with fast attack, slow decay
    const dur = 0.38;
    const sandLen = Math.floor(sr * dur);
    const sandBuf = c.createBuffer(1, sandLen, sr);
    const sandD = sandBuf.getChannelData(0);
    for (let i = 0; i < sandLen; i++) {
      const attackEnd = Math.floor(sr * 0.018);
      const env = i < attackEnd
        ? i / attackEnd
        : Math.pow(1 - (i - attackEnd) / (sandLen - attackEnd), 0.75);
      sandD[i] = (Math.random() * 2 - 1) * env;
    }
    const sand = c.createBufferSource(); sand.buffer = sandBuf;
    // Band-limited to sound granular, not just white noise
    const sandFilt = c.createBiquadFilter(); sandFilt.type = "bandpass";
    sandFilt.frequency.value = 900; sandFilt.Q.value = 0.55;
    const sandG = c.createGain(); sandG.gain.setValueAtTime(0.32, t);
    sand.connect(sandFilt); sandFilt.connect(sandG); sandG.connect(c.destination);
    sand.start(t);

    // Low-frequency thud of ball hitting the sand
    const thud = c.createOscillator(); thud.type = "sine";
    const thudG = c.createGain();
    thud.frequency.setValueAtTime(160, t);
    thud.frequency.exponentialRampToValueAtTime(55, t + 0.13);
    thudG.gain.setValueAtTime(0.22, t);
    thudG.gain.exponentialRampToValueAtTime(0.001, t + 0.17);
    thud.connect(thudG); thudG.connect(c.destination);
    thud.start(t); thud.stop(t + 0.2);

    // Brief high splatter (the sand grains hitting the surface)
    const splatLen = Math.floor(sr * 0.08);
    const splatBuf = c.createBuffer(1, splatLen, sr);
    const splatD = splatBuf.getChannelData(0);
    for (let i = 0; i < splatLen; i++) splatD[i] = (Math.random() * 2 - 1) * (1 - i/splatLen);
    const splat = c.createBufferSource(); splat.buffer = splatBuf;
    const splatFilt = c.createBiquadFilter(); splatFilt.type = "highpass"; splatFilt.frequency.value = 3500;
    const splatG = c.createGain(); splatG.gain.setValueAtTime(0.10, t + 0.02);
    splat.connect(splatFilt); splatFilt.connect(splatG); splatG.connect(c.destination);
    splat.start(t + 0.02);
  } catch(_) {}
}

const S = {
  async get(k) {
    try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; }
  },
  async set(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch(_) {}
  },
};

/* ═══════════════════════════════════════════════════════
   GAME FACTORY
═══════════════════════════════════════════════════════ */
function makeGame(pool = ALL_COURSES) {
  const shuffled = [...pool].sort(() => Math.random() - .5);
  const picks = shuffled.slice(0, 5);
  return picks.map(correct => {
    const others = ALL_COURSES.filter(c => c.id !== correct.id).sort(() => Math.random() - .5).slice(0, 3);
    const opts = [...others, correct].sort(() => Math.random() - .5);
    return { correct, opts, ansIdx: opts.findIndex(o => o.id === correct.id) };
  });
}

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
const fmt = ms => ms < 1000 ? `${ms}ms` : `${(ms/1000).toFixed(1)}s`;
const fmtFull = ms => (ms/1000).toFixed(2) + "s";

function calcStats(history) {
  if (!history.length) return { games:0, correct:0, total:0, correctRate:0, perfect:0, maxStreak:0, bestTime:null, fastestAnswer:null, perfectFastGame:null, quickReturn:false };
  let correct=0, total=0, perfect=0, streak=0, maxStreak=0, bestTime=null, fastestAnswer=null, perfectFastGame=null, quickReturn=false;
  history.forEach((g, i) => {
    const score = g.results.filter(Boolean).length;
    correct += score; total += 5;
    if (score === 5) { perfect++; streak++; maxStreak = Math.max(maxStreak, streak); if (!bestTime || g.totalMs < bestTime) bestTime = g.totalMs; if (g.totalMs < 20000) perfectFastGame = g.totalMs; }
    else streak = 0;
    g.times.forEach(t => { if (g.results[g.times.indexOf(t)]) { if (!fastestAnswer || t < fastestAnswer) fastestAnswer = t; } });
    if (i > 0) { const prev = history[i-1]; if (g.ts - prev.ts < 30*60*1000) quickReturn = true; }
  });
  return { games:history.length, correct, total, correctRate: total ? Math.round(correct/total*100) : 0, perfect, maxStreak, bestTime, fastestAnswer, perfectFastGame, quickReturn };
}

function checkTrophies(stats, prevTrophySet) {
  const earned = new Set(prevTrophySet);
  const newOnes = [];
  TROPHY_DEFS.forEach(t => {
    if (!earned.has(t.id) && t.check(stats)) { earned.add(t.id); newOnes.push(t); }
  });
  return { earned, newOnes };
}

function generateShare(game, results, times, profile, stats) {
  const score = results.filter(Boolean).length;
  const total = times.reduce((a,b)=>a+b,0);
  const emojis = results.map(r => r ? "✅" : "❌").join("");
  const lines = [
    `⛳ Golf Course IQ`,
    profile.username ? `🏌️ @${profile.username}${profile.tagline ? ` · "${profile.tagline}"` : ""}` : "",
    ``,
    `${emojis}`,
    `📊 ${score}/5 correct · ⏱️ ${fmtFull(total)} total`,
    ``,
    ...game.map((q,i) => {
      const picked = q.opts.find((_, oi) => oi === (results[i] ? q.ansIdx : game[i]._picked));
      return `${results[i]?"✅":"❌"} Q${i+1}: ${q.correct.name} (${fmtFull(times[i])})`;
    }),
    ``,
    `🏅 All-time: ${stats.correctRate}% · ${stats.games} game${stats.games!==1?"s":""}`,
    ``,
    `Play Golf Course IQ → golf-iq.app`,
  ].filter(l => l !== undefined);
  return lines.join("\n");
}

/* ═══════════════════════════════════════════════════════
   CLUB CREST — SVG heraldic badge rendered when no logo loads.
   Looks like an actual embroidered club crest, not letters.
═══════════════════════════════════════════════════════ */
function ClubCrest({ course, size }) {
  const r = size / 2;
  const numDots = 16;
  // Outer decorative ring dots
  const dots = Array.from({ length: numDots }, (_, i) => {
    const angle = (i / numDots) * Math.PI * 2 - Math.PI / 2;
    return {
      x: r + (r - 7) * Math.cos(angle),
      y: r + (r - 7) * Math.sin(angle),
    };
  });
  // Crossed clubs path (simplified SVG paths centered on r,r)
  const sc = size / 100; // scale factor
  const cx = r, cy = r;

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display:"block" }}>
      <defs>
        <radialGradient id={`bg-${course.id}`} cx="40%" cy="35%">
          <stop offset="0%" stopColor={course.col} stopOpacity="1" />
          <stop offset="100%" stopColor={`${course.col}88`} stopOpacity="1" />
        </radialGradient>
        <radialGradient id={`sheen-${course.id}`} cx="38%" cy="28%">
          <stop offset="0%" stopColor="rgba(255,255,255,0.18)" />
          <stop offset="60%" stopColor="rgba(255,255,255,0)" />
        </radialGradient>
      </defs>

      {/* Background circle */}
      <circle cx={r} cy={r} r={r - 1} fill={`url(#bg-${course.id})`} />

      {/* Sheen highlight */}
      <circle cx={r} cy={r} r={r - 1} fill={`url(#sheen-${course.id})`} />

      {/* Outer gold ring */}
      <circle cx={r} cy={r} r={r - 2} fill="none" stroke="rgba(200,168,75,0.75)" strokeWidth="2" />

      {/* Inner decorative ring */}
      <circle cx={r} cy={r} r={r * 0.78} fill="none" stroke="rgba(200,168,75,0.3)" strokeWidth="1" strokeDasharray="3 2.5" />

      {/* Decorative dots on outer ring */}
      {dots.map((d, i) => (
        <circle key={i} cx={d.x} cy={d.y} r={i % 4 === 0 ? 2 : 1.2}
          fill={i % 4 === 0 ? "rgba(200,168,75,0.85)" : "rgba(200,168,75,0.4)"} />
      ))}

      {/* Course symbol emoji — prominent, centered */}
      {course.sym
        ? <>
            <text
              x={r} y={cy + r * 0.18}
              textAnchor="middle" dominantBaseline="middle"
              fontSize={size * 0.38}
              style={{ userSelect:"none" }}
            >
              {course.sym}
            </text>
            {/* Club initials below emoji */}
            <text
              x={r} y={cy + r * 0.72}
              textAnchor="middle"
              fontSize={course.init.length > 3 ? size * 0.105 : course.init.length > 2 ? size * 0.12 : size * 0.135}
              fontFamily="'Playfair Display', Georgia, serif"
              fontWeight="700"
              fill="rgba(255,220,120,0.9)"
              letterSpacing="1.5"
            >
              {course.init}
            </text>
          </>
        : <>
            {/* Fallback: golf flag + initials */}
            <line x1={cx - 2} y1={cy - r * 0.36} x2={cx - 2} y2={cy + r * 0.32}
              stroke="rgba(220,195,110,0.9)" strokeWidth={1.6 * sc * 2} strokeLinecap="round" />
            <polygon
              points={`${cx - 1},${cy - r * 0.36} ${cx + r * 0.26},${cy - r * 0.22} ${cx - 1},${cy - r * 0.06}`}
              fill="rgba(200,168,75,0.9)" />
            <ellipse cx={cx - 2} cy={cy + r * 0.34} rx={r * 0.16} ry={r * 0.045}
              fill="rgba(0,0,0,0.25)" />
            <text
              x={r} y={cy + r * 0.61}
              textAnchor="middle"
              fontSize={course.init.length > 3 ? size * 0.115 : course.init.length > 2 ? size * 0.135 : size * 0.155}
              fontFamily="'Playfair Display', Georgia, serif"
              fontWeight="700"
              fill="rgba(255,220,120,0.95)"
              letterSpacing="1.5"
            >
              {course.init}
            </text>
          </>
      }

      {/* Thin gold baseline under initials */}
      <line
        x1={r - r * 0.32} y1={cy + r * 0.78}
        x2={r + r * 0.32} y2={cy + r * 0.78}
        stroke="rgba(200,168,75,0.4)" strokeWidth="0.8"
      />
    </svg>
  );
}

/* ═══════════════════════════════════════════════════════
   COURSE LOGO — logoUrl → SVG Crest fallback
   + "Suggest Logo" button so users can paste better URLs.
═══════════════════════════════════════════════════════ */
function CourseLogo({ course, size = 120, allowSuggest = false, uploadedData = null }) {
  const [savedData, setSavedData]   = useState(null);  // base64 data URL from storage
  const [failed, setFailed]         = useState(false);
  const [open, setOpen]             = useState(false);
  const [dragging, setDragging]     = useState(false);
  const [preview, setPreview]       = useState(null);  // base64 preview before save
  const [saving, setSaving]         = useState(false);
  const [saved, setSaved]           = useState(false);
  const fileInputRef = useRef(null);
  const imgRef = useRef(null);

  // What actually shows: uploaded base64 > built-in URL
  const activeUrl = savedData || course.logoUrl;

  // Load saved base64 logo from storage on mount
  useEffect(() => {
    if (uploadedData) { setSavedData(uploadedData); setFailed(false); }
  }, [uploadedData]);

  const onErr = () => { if (!savedData) setFailed(true); };
  const onLoad = () => {
    const img = imgRef.current;
    if (img && img.naturalWidth > 0 && img.naturalWidth < 8) onErr();
  };

  // Convert file → base64 and show preview
  const processFile = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = (e) => setPreview(e.target.result);
    reader.readAsDataURL(file);
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDragging(false);
    const file = e.dataTransfer.files?.[0];
    if (file) processFile(file);
  };

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (file) processFile(file);
  };

  const saveLogo = async () => {
    if (!preview) return;
    setSaving(true);
    try {
      // Resize to max 120x120 before saving
      const resized = await new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const MAX = 120;
          const scale = Math.min(MAX/img.width, MAX/img.height, 1);
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL("image/png", 0.85));
        };
        img.onerror = () => resolve(preview);
        img.src = preview;
      });
      db.save(course.id, resized);
      // saved via db.save above
      if (!check || !check.value) throw new Error("verify failed");
      setSavedData(resized);
      setFailed(false);
      setPreview(null);
      setOpen(false);
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    } catch(e) {
      alert("Save failed — image may be too large. Try a smaller file.");
    }
    setSaving(false);
  };

  const removeLogo = async () => {
    db.remove(course.id);
    setSavedData(null);
    setPreview(null);
    setFailed(!course.logoUrl);
    setOpen(false);
  };

  return (
    <div style={{ position:"relative", display:"inline-block" }}>
      {/* ── Main logo display ── */}
      <div style={{
        width: size, height: size, borderRadius: "50%", overflow: "hidden",
        flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
        background: (failed || !activeUrl) ? "transparent" : "white",
        transition: "box-shadow .3s",
        ...(saved ? { boxShadow:"0 0 0 3px #4caf7d, 0 0 20px rgba(76,175,80,.5)" } : {}),
      }}>
        {activeUrl && !failed
          ? <img ref={imgRef} src={activeUrl} alt={course.name}
              style={{ width:"100%", height:"100%", objectFit:"contain", padding:6, display:"block" }}
              onError={onErr} onLoad={onLoad} />
          : <ClubCrest course={course} size={size} />
        }
      </div>

      {/* ── Upload button ── */}
      {allowSuggest && !open && (
        <button onClick={() => { setOpen(true); setPreview(null); }}
          title="Upload logo image"
          style={{
            position:"absolute", bottom:-6, right:-6,
            background: savedData ? "rgba(76,175,80,0.2)" : "rgba(200,168,75,0.15)",
            border: `1px solid ${savedData ? "rgba(76,175,80,0.5)" : "rgba(200,168,75,0.4)"}`,
            borderRadius:"50%", width:26, height:26, cursor:"pointer",
            fontSize:13, display:"flex", alignItems:"center", justifyContent:"center",
            color: savedData ? "rgba(76,175,80,0.9)" : "rgba(200,168,75,0.8)", lineHeight:1,
          }}>{savedData ? "✓" : "📷"}</button>
      )}

      {/* ── Upload popover ── */}
      {open && (
        <div style={{
          position:"absolute", top:"110%", left:"50%", transform:"translateX(-50%)",
          background:"#0a1420", border:"1px solid rgba(200,168,75,0.45)",
          borderRadius:12, padding:"14px 16px", zIndex:999, width:260,
          boxShadow:"0 12px 32px rgba(0,0,0,0.7)",
        }}>
          <div style={{fontSize:11,color:"rgba(200,168,75,0.8)",marginBottom:10,
            letterSpacing:".08em",fontWeight:600,textAlign:"center"}}>
            📷 ADD LOGO · {course.name.toUpperCase().split(" ").slice(0,3).join(" ")}
          </div>

          {/* Drop zone */}
          <div
            onDrop={handleDrop}
            onDragOver={e=>{e.preventDefault();setDragging(true);}}
            onDragLeave={()=>setDragging(false)}
            onClick={()=>fileInputRef.current?.click()}
            style={{
              border: `2px dashed ${dragging ? "rgba(200,168,75,0.8)" : "rgba(200,168,75,0.3)"}`,
              borderRadius:8, padding:"14px 10px", textAlign:"center",
              cursor:"pointer", marginBottom:10, transition:"all .2s",
              background: dragging ? "rgba(200,168,75,0.08)" : "rgba(255,255,255,0.03)",
            }}>
            {preview
              ? <img src={preview} alt="preview"
                  style={{width:72,height:72,objectFit:"contain",borderRadius:8,
                    background:"white",padding:4,display:"block",margin:"0 auto 6px"}} />
              : <div style={{fontSize:28,marginBottom:4}}>🖼️</div>

              }
            </div>

          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <button onClick={saveLogo} disabled={!preview || saving}
              style={{
                flex:1, background: preview ? "rgba(76,175,80,0.2)" : "rgba(255,255,255,0.05)",
                border:`1px solid ${preview ? "rgba(76,175,80,0.5)" : "rgba(255,255,255,0.1)"}`,
                borderRadius:6, color: preview ? "rgba(76,175,80,0.95)" : "rgba(255,255,255,0.3)",
                padding:"7px 0", cursor: preview ? "pointer" : "not-allowed",
                fontSize:12, fontWeight:700, letterSpacing:".05em",
              }}>
              {saving ? "Saving…" : "✓ Save Logo"}
            </button>
            <button onClick={()=>{setOpen(false);setPreview(null);}}
              style={{
                background:"transparent", border:"1px solid rgba(255,255,255,0.15)",
                borderRadius:6, color:"rgba(255,255,255,0.4)", padding:"7px 10px",
                cursor:"pointer", fontSize:12,
              }}>✕</button>
          </div>

          {savedData && (
            <button onClick={removeLogo}
              style={{
                width:"100%", background:"rgba(255,60,60,0.08)",
                border:"1px solid rgba(255,60,60,0.25)", borderRadius:6,
                color:"rgba(255,100,100,0.7)", padding:"5px 0",
                cursor:"pointer", fontSize:11,
              }}>Remove uploaded logo</button>
          )}

          <div style={{fontSize:9,color:"rgba(200,168,75,0.3)",marginTop:8,
            textAlign:"center",lineHeight:1.4}}>
            Saved as embedded image · works offline · permanent
          </div>
        </div>
      )}
    </div>
  );
}

  const cls = { idle:"gi-opt-idle", sel:"gi-opt-sel", ok:"gi-opt-ok", bad:"gi-opt-bad", dim:"gi-opt-dim" };
  const icons = { ok:"✓", bad:"✗" };
  const rippleRef = useRef(null);

  const handleClick = (e) => {
    if (disabled || state !== "idle") return;
    // Ripple
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const rip = document.createElement("div");
    rip.className = "gi-ripple";
    rip.style.left = `${e.clientX - rect.left}px`;
    rip.style.top  = `${e.clientY - rect.top}px`;
    btn.appendChild(rip);
    setTimeout(() => rip.remove(), 650);
    onClick();
  };

  return (
    <button className={`gi-opt ${cls[state]||"gi-opt-idle"}`}
      onClick={handleClick} disabled={disabled || state==="dim"} style={{position:"relative",overflow:"hidden"}}>
      <div className="gi-opt-inner">
        <span className="gi-opt-letter">{letter}</span>
        <div className="gi-opt-sep" />
        <span className="gi-opt-text">
          <span style={{fontWeight:600}}>{option.name}</span>
          <br/>
          <span style={{fontSize:12,opacity:.7,fontWeight:400}}>📍 {option.loc}</span>
        </span>
        {(state==="ok"||state==="bad") && <span className="gi-opt-icon">{icons[state]}</span>}
      </div>
    </button>
  );
}

/* ═══════════════════════════════════════════════════════
   GAME SCREEN
═══════════════════════════════════════════════════════ */
function GameScreen({ game, profile, logos, onComplete }) {
  const [qIdx, setQIdx]       = useState(0);
  const [results, setResults] = useState([]);
  const [times, setTimes]     = useState([]);
  const [picked, setPicked]   = useState([]); // index chosen per Q
  const [phase, setPhase]     = useState("idle"); // idle | sel | done
  const [selectedOpt, setSel] = useState(null);
  const [elapsed, setElapsed] = useState(0);
  const qStart                = useRef(Date.now());
  const timerRef              = useRef(null);

  const q = game[qIdx];
  const totalElapsed = times.reduce((a,b)=>a+b,0) + elapsed;

  // Per-question timer
  useEffect(() => {
    qStart.current = Date.now();
    setElapsed(0);
    timerRef.current = setInterval(() => setElapsed(Date.now() - qStart.current), 87);
    return () => clearInterval(timerRef.current);
  }, [qIdx]);

  const choose = (optIdx) => {
    if (phase !== "idle") return;
    clearInterval(timerRef.current);
    const t = Date.now() - qStart.current;
    const correct = optIdx === q.ansIdx;
    setSel(optIdx);
    setPhase("sel");
    playClick();

    setTimeout(() => {
      setPhase("done");
      correct ? playCupIn() : playWrong();

      const newResults = [...results, correct];
      const newTimes   = [...times, t];
      const newPicked  = [...picked, optIdx];
      setResults(newResults); setTimes(newTimes); setPicked(newPicked);

      if (qIdx < 4) {
        setTimeout(() => {
          setQIdx(i => i+1);
          setSel(null); setPhase("idle");
        }, 1400);
      } else {
        setTimeout(() => onComplete({ results:newResults, times:newTimes, picked:newPicked }), 1600);
      }
    }, 480);
  };

  const optState = (i) => {
    if (phase === "idle") return "idle";
    if (phase === "sel")  return i === selectedOpt ? "sel" : "idle";
    if (i === q.ansIdx)   return "ok";
    if (i === selectedOpt) return "bad";
    return "idle";
  };

  const isOver6s = elapsed > 6000;

  return (
    <div className="gi-app" style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div className="gi-stars"/>
      <div className="gi-screen" style={{flex:1,display:"flex",flexDirection:"column",maxWidth:520,margin:"0 auto",width:"100%",padding:"18px 16px",gap:14}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {Array.from({length:5},(_,i)=>(
              <div key={i} className={`gi-dot ${i<qIdx?(results[i]?"gi-dot-correct":"gi-dot-wrong"):i===qIdx?"gi-dot-active":""}`}/>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div className={`gi-timer ${isOver6s?"gi-timer-fast":""}`}>{fmtFull(elapsed)}</div>
            <div style={{fontSize:10,color:"rgba(200,168,75,.4)",letterSpacing:".1em"}}>THIS HOLE</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontWeight:700,color:"rgba(200,168,75,.8)",fontSize:18}}>
              {results.filter(Boolean).length}/{qIdx}
            </div>
            <div style={{fontSize:10,color:"rgba(200,168,75,.4)",letterSpacing:".08em"}}>SCORE</div>
          </div>
        </div>

        <div className="gi-progress-wrap"><div className="gi-progress-fill" style={{width:`${(qIdx/5)*100}%`}}/></div>

        {/* Logo spotlight */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 0",position:"relative"}}>
          <div className="gi-spotlight" style={{width:240,height:240}}/>
          <div className="gi-logo-ring" style={{width:144,height:144,position:"relative",zIndex:1}}>
            <CourseLogo course={q.correct} size={144} allowSuggest={true} uploadedData={logos && logos[q.correct.id]}/>
          </div>
          <div style={{marginTop:14,textAlign:"center",position:"relative",zIndex:1}}>
            <div style={{fontSize:12,color:"rgba(200,168,75,.5)",letterSpacing:".14em",marginBottom:4}}>
              HOLE {qIdx+1} OF 5
            </div>
            <div style={{fontSize:11,color:"rgba(200,180,140,.4)",letterSpacing:".06em"}}>
              {q.correct.logoUrl ? "Which course does this logo belong to?" : "Which course does this emblem represent?"}
            </div>
            {!q.correct.logoUrl && (
              <div style={{fontSize:9,color:"rgba(200,168,75,.25)",marginTop:4,letterSpacing:".04em"}}>
                Have the real logo? Tap 📷 to upload it
              </div>
            )}
          </div>
        </div>

        {/* Options */}
        <div style={{display:"flex",flexDirection:"column",gap:9,flex:1}}>
          {q.opts.map((opt, i) => (
            <OptBtn key={opt.id} letter={"ABCD"[i]} option={opt}
              state={optState(i)} onClick={()=>choose(i)} disabled={phase!=="idle"}/>
          ))}
        </div>

        {/* Total time */}
        <div style={{textAlign:"center",fontSize:12,color:"rgba(200,168,75,.3)",letterSpacing:".08em"}}>
          ⏱ TOTAL: {fmtFull(totalElapsed)}
        </div>
      </div>
    </div>
  );
}

                <div className="gi-trophy-icon" style={{background: isEarned ? `radial-gradient(circle, ${rc}44, ${rc}11)` : "rgba(255,255,255,.04)", border: `1.5px solid ${isEarned?rc+"66":"rgba(255,255,255,.08)"}`}}>
                  {t.icon}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:700,fontSize:15,color: isEarned ? "#f0dfa0" : "rgba(200,180,140,.4)"}}>{t.name}</span>
                    <span style={{fontSize:9,fontWeight:700,letterSpacing:".1em",color:rc,textTransform:"uppercase",
                      padding:"2px 6px",border:`1px solid ${rc}55`,borderRadius:2}}>{t.rarity}</span>
                  </div>
                  <div style={{fontSize:12,color: isEarned ? "rgba(200,180,140,.65)" : "rgba(200,180,140,.25)",marginTop:3}}>{t.desc}</div>
                </div>
                <div style={{fontSize:20}}>{isEarned?"✓":"🔒"}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ADMIN SCREEN — Logo Manager
═══════════════════════════════════════════════════════ */
function AdminLogoCard({ course, uploadedData, onSave, onRemove }) {
  const [dragging, setDragging] = useState(false);
  const [saving, setSaving]     = useState(false);
  const [flash, setFlash]       = useState(false);
  const [imgErr, setImgErr]     = useState(false);
  const fileRef                 = useRef(null);
  const dragCount               = useRef(0);

  const status = uploadedData ? "up" : course.logoUrl ? "bi" : "mi";
  const displayUrl = uploadedData || (course.logoUrl && !imgErr ? course.logoUrl : null);
  const borderColor = flash ? "#4caf7d" : dragging ? "#c8a84b" : status === "up" ? "rgba(76,175,80,.5)" : "rgba(255,255,255,.1)";

  const readAndSave = function(file) {
    if (!file) return;
    setSaving(true);
    var reader = new FileReader();
    reader.onload = function(e) {
      onSave(course.id, e.target.result);
      setSaving(false);
      setFlash(true);
      setTimeout(function(){ setFlash(false); }, 1500);
    };
    reader.onerror = function() {
      setSaving(false);
      alert("Could not read file.");
    };
    reader.readAsDataURL(file);
  };

  const handleDrop = function(e) {
    e.preventDefault();
    dragCount.current = 0;
    setDragging(false);
    var files = e.dataTransfer.files;
    if (files && files.length > 0) { readAndSave(files[0]); return; }
    var items = e.dataTransfer.items;
    if (items && items.length > 0 && items[0].kind === "file") { readAndSave(items[0].getAsFile()); }
  };

  const doSave = function() {};

  return (
    <div
      onDrop={handleDrop}
      onDragEnter={function(e){ e.preventDefault(); dragCount.current++; setDragging(true); }}
      onDragOver={function(e){ e.preventDefault(); }}
      onDragLeave={function(e){ e.preventDefault(); dragCount.current--; if(dragCount.current<=0){dragCount.current=0;setDragging(false);} }}
      style={{background:"#0d1520",border:"2px solid "+borderColor,borderRadius:12,padding:"12px 10px",
        display:"flex",flexDirection:"column",alignItems:"center",gap:7,position:"relative",
        boxShadow:flash?"0 0 14px rgba(76,175,80,.4)":dragging?"0 0 14px rgba(200,168,75,.3)":"none",
        transition:"border-color .2s,box-shadow .2s"}}>

      <div style={{position:"absolute",top:5,left:7,fontSize:9,color:"rgba(200,168,75,.3)",fontFamily:"monospace"}}>#{course.rank}</div>
      <div style={{position:"absolute",top:7,right:7,width:7,height:7,borderRadius:"50%",
        background:status==="up"?"#4caf7d":status==="bi"?"#c8a84b":"#333"}} />

      <div onClick={function(){ fileRef.current && fileRef.current.click(); }}
        style={{width:76,height:76,borderRadius:"50%",cursor:"pointer",overflow:"hidden",flexShrink:0,
          background:displayUrl?"white":"rgba(255,255,255,.04)",
          border:"1px dashed "+(dragging?"rgba(200,168,75,.7)":"rgba(255,255,255,.1)"),
          display:"flex",alignItems:"center",justifyContent:"center"}}>
        {displayUrl
            ? <img src={displayUrl} alt="" style={{width:"100%",height:"100%",objectFit:"contain",padding:4}} onError={function(){setImgErr(true);}}/>
            : <div style={{textAlign:"center",pointerEvents:"none"}}>
                <div style={{fontSize:24}}>{course.sym}</div>
                <div style={{fontSize:7,color:"rgba(200,168,75,.3)"}}>DROP</div>
              </div>
        }
      </div>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}}
        onChange={function(e){ readAndSave(e.target.files && e.target.files[0]); }} />

      <div style={{fontSize:11,fontWeight:700,color:"#e8d5a0",textAlign:"center",lineHeight:1.3,wordBreak:"break-word"}}>{course.name}</div>
      <div style={{fontSize:9,color:"rgba(200,168,75,.33)",textAlign:"center"}}>{course.loc}</div>

      {saving ? (
        <div style={{fontSize:10,color:"rgba(200,168,75,.6)"}}>Saving…</div>
      ) : flash ? (
        <div style={{fontSize:10,color:"rgba(76,175,80,.9)",fontWeight:700}}>✓ Saved!</div>
      ) : uploadedData ? (
        <button onClick={function(){ onRemove(course.id); }}
          style={{width:"100%",background:"rgba(255,60,60,.07)",border:"1px solid rgba(255,60,60,.2)",
            borderRadius:6,color:"rgba(255,100,100,.4)",padding:"4px 0",cursor:"pointer",fontSize:9}}>Remove</button>
      ) : (
        <div style={{fontSize:9,color:"rgba(255,255,255,.12)",textAlign:"center"}}>
          {status==="bi" ? "⚠ URL" : "drop to add"}
        </div>
      )}
    </div>
  );
}

function AdminScreen({ logos={}, onSaveLogo, onRemoveLogo, onBack }) {
  const [filter, setFilter]     = useState("all");
  const [search, setSearch]     = useState("");
  const [sortBy, setSortBy]     = useState("alpha");
  const [toast, setToast]       = useState(null);
  const [importText, setImportText] = useState("");
  const [showImport, setShowImport] = useState(false);

  const handleSave = function(id, dataUrl) {
    onSaveLogo(id, dataUrl);
    var c = ALL_COURSES.find(function(c){ return c.id===id; });
    setToast("✓ " + (c ? c.name : id) + " saved");
    setTimeout(function(){ setToast(null); }, 2000);
  };

  const handleRemove = function(id) { onRemoveLogo(id); };

  const handleExport = async function() {
    var result = await db.loadAll();
    var json = JSON.stringify(result);
    var a = document.createElement("a");
    a.href = "data:application/octet-stream," + encodeURIComponent(json);
    a.download = "golf-iq-logos.json";
    a.style.display = "none";
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ document.body.removeChild(a); }, 100);
    setToast("✓ Exported " + Object.keys(result).length + " logos");
    setTimeout(function(){ setToast(null); }, 3000);
  };

  const handleImport = function() {
    try {
      var data = JSON.parse(importText);
      var ids = Object.keys(data);
      ids.forEach(function(id) {
        var val = data[id];
        if (typeof val === "string" && val.indexOf("data:") === 0) {
          onSaveLogo(id, val);
        }
      });
      setShowImport(false);
      setImportText("");
      setToast("✓ Imported " + ids.length + " logos");
      setTimeout(function(){ setToast(null); }, 3000);
    } catch(err) {
      alert("Import failed — paste the full exported text.");
    }
  };

  var uploadCount  = Object.keys(logos).length;
  var builtinCount = ALL_COURSES.filter(function(c){ return c.logoUrl && !logos[c.id]; }).length;
  var missingCount = ALL_COURSES.filter(function(c){ return !c.logoUrl && !logos[c.id]; }).length;

  var sorted = ALL_COURSES.map(function(c,i){ return Object.assign({},c,{rank:i+1}); });
  if (sortBy === "alpha") {
    sorted = sorted.slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
  }
  var visible = sorted.filter(function(c) {
    var st = logos[c.id] ? "up" : c.logoUrl ? "bi" : "mi";
    if (filter === "uploaded" && st !== "up") return false;
    if (filter === "builtin"  && st !== "bi") return false;
    if (filter === "missing"  && st !== "mi") return false;
    if (search) {
      var q = search.toLowerCase();
      return c.name.toLowerCase().indexOf(q) >= 0 || c.loc.toLowerCase().indexOf(q) >= 0;
    }
    return true;
  });

  var filterBtns = [
    {label:"All",       key:"all",      count:100},
    {label:"Uploaded",  key:"uploaded", count:uploadCount},
    {label:"URL",       key:"builtin",  count:builtinCount},
    {label:"Missing",   key:"missing",  count:missingCount},
  ];


  return (
    <div className="gi-app" style={{minHeight:"100vh"}}>
      <div className="gi-stars"/>
      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px",position:"relative",zIndex:1}}>

        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          <button className="gi-btn gi-btn-ghost" onClick={onBack} style={{padding:"8px 0"}}>← Back</button>
          <div style={{flex:1}}>
            <div className="gi-serif gi-gold" style={{fontSize:22,fontWeight:700}}>Logo Manager</div>
            <div style={{fontSize:11,color:"rgba(200,168,75,.4)"}}>{uploadCount} uploaded · drag images onto cards</div>
          </div>
          <button onClick={handleExport}
            style={{padding:"7px 14px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:700,
              background:"rgba(76,175,80,.15)",border:"1px solid rgba(76,175,80,.4)",color:"rgba(76,175,80,.9)"}}>
            ⬇ Export
          </button>
          <button onClick={function(){ setShowImport(function(v){return !v;}); setExportText(null); }}
            style={{padding:"7px 14px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:700,
              background:"rgba(200,168,75,.15)",border:"1px solid rgba(200,168,75,.4)",color:"rgba(200,168,75,.9)"}}>
            ⬆ Import
          </button>
        </div>

        {showImport && (
          <div style={{marginBottom:12,background:"rgba(0,0,0,.5)",borderRadius:8,padding:12}}>
            <div style={{fontSize:11,color:"rgba(200,168,75,.7)",marginBottom:6}}>
              Paste your previously exported text here:
            </div>
            <textarea value={importText}
              onChange={function(e){ setImportText(e.target.value); }}
              placeholder="Paste exported logo data here..."
              style={{width:"100%",height:72,background:"rgba(0,0,0,.4)",border:"1px solid rgba(200,168,75,.3)",
                borderRadius:6,color:"rgba(200,168,75,.8)",fontSize:10,padding:8,
                boxSizing:"border-box",resize:"none",display:"block"}}/>
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <button onClick={handleImport}
                style={{padding:"5px 14px",fontSize:11,cursor:"pointer",fontWeight:700,
                  background:"rgba(200,168,75,.2)",border:"1px solid rgba(200,168,75,.5)",
                  borderRadius:6,color:"rgba(200,168,75,.9)"}}>✓ Import</button>
              <button onClick={function(){ setShowImport(false); setImportText(""); }}
                style={{padding:"5px 10px",fontSize:11,cursor:"pointer",
                  background:"transparent",border:"1px solid rgba(255,255,255,.2)",
                  borderRadius:6,color:"rgba(255,255,255,.4)"}}>Cancel</button>
            </div>
          </div>
        )}

        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
          {filterBtns.map(function(f){
            return (
              <button key={f.key} onClick={function(){ setFilter(f.key); }}
                style={{padding:"6px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:700,
                  background:filter===f.key?"rgba(200,168,75,.25)":"rgba(255,255,255,.06)",
                  border:"1px solid "+(filter===f.key?"rgba(200,168,75,.6)":"rgba(255,255,255,.1)"),
                  color:filter===f.key?"#c8a84b":"rgba(255,255,255,.4)"}}>
                {f.label} ({f.count})
              </button>
            );
          })}
          <input value={search} onChange={function(e){ setSearch(e.target.value); }}
            placeholder="Search…"
            style={{flex:1,minWidth:100,background:"rgba(255,255,255,.05)",
              border:"1px solid rgba(200,168,75,.2)",borderRadius:20,color:"#e8d5a0",
              padding:"6px 14px",fontSize:12,outline:"none"}}/>
          {[{key:"rank",label:"# Rank"},{key:"alpha",label:"A–Z"}].map(function(s){
            return (
              <button key={s.key} onClick={function(){ setSortBy(s.key); }}
                style={{padding:"6px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:700,
                  background:sortBy===s.key?"rgba(200,168,75,.2)":"rgba(255,255,255,.04)",
                  border:"1px solid "+(sortBy===s.key?"rgba(200,168,75,.5)":"rgba(255,255,255,.1)"),
                  color:sortBy===s.key?"#c8a84b":"rgba(255,255,255,.3)"}}>
                {s.label}
              </button>
            );
          })}
          <span style={{fontSize:11,color:"rgba(200,168,75,.35)"}}>{visible.length} shown</span>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10}}>
          {visible.map(function(c){
            return (
              <AdminLogoCard key={c.id} course={c}
                uploadedData={logos[c.id]||null}
                onSave={handleSave}
                onRemove={handleRemove}/>
            );
          })}
        </div>

        <div style={{marginTop:24,paddingTop:12,borderTop:"1px solid rgba(200,168,75,.1)",
          display:"flex",gap:16,flexWrap:"wrap",fontSize:9,color:"rgba(200,168,75,.25)"}}>
          <span>🟢 Uploaded</span>
          <span>🟡 Built-in URL</span>
          <span>⚫ Missing</span>
          <span>Click circle or drop image onto card to upload</span>
        </div>
      </div>

      {toast && (
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
          background:"rgba(30,120,60,.95)",color:"white",borderRadius:20,
          padding:"8px 20px",fontSize:13,fontWeight:700,zIndex:9999,
          boxShadow:"0 4px 20px rgba(0,0,0,.5)"}}>
          {toast}
        </div>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════ */
function GolfIQ() {
  const [screen, setScreen]       = useState("loading");
  const [profile, setProfile]     = useState(null);
  const [history, setHistory]     = useState([]);
  const [trophies, setTrophies]   = useState(new Set());
  const [currentGame, setGame]    = useState(null);
  const [gameResult, setResult]   = useState(null);
  const [newTrophies, setNewTr]   = useState([]);
  const [logos, setLogos]         = useState({});
  const lastGameTs                = useRef(null);

  // Load persisted data
  useEffect(() => {
    (async () => {
      const [p, h, tr] = await Promise.all([S.get("gp-profile"), S.get("gp-history"), S.get("gp-trophies")]);
      if (p) setProfile(p);
      if (h) setHistory(h);
      if (tr) setTrophies(new Set(tr));
      // Load logos from Supabase
      const logoData = await db.loadAll();
      if (Object.keys(logoData).length > 0) setLogos(logoData);
      setScreen(p ? "home" : "setup");
    })();
  }, []);

  const saveLogo = function(id, dataUrl, silent) {
    var img = new Image();
    img.onload = function() {
      var MAX = 120;
      var scale = Math.min(MAX / img.width, MAX / img.height, 1);
      var canvas = document.createElement("canvas");
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      var small = canvas.toDataURL("image/jpeg", 0.8);
      setLogos(function(prev){ return Object.assign({}, prev, {[id]: small}); });
      if (!silent) db.save(id, small);
    };
    img.onerror = function() { alert("Could not read image."); };
    img.src = dataUrl;
  };

  const removeLogo = (id) => {
    db.remove(id);
    setLogos(prev => {
      const n = Object.assign({}, prev);
      delete n[id];
      return n;
    });
  };

  const stats = calcStats(history);

  const saveProfile = async (p) => { setProfile(p); await S.set("gp-profile", p); setScreen("home"); };

  const startGame = () => {
    const quick = lastGameTs.current && Date.now() - lastGameTs.current < 30*60*1000;
    setGame(makeGame()); setScreen("playing");
  };

  const onGameComplete = async ({ results, times, picked }) => {
    lastGameTs.current = Date.now();
    const gameRecord = { results, times, picked, totalMs: times.reduce((a,b)=>a+b,0), ts: Date.now() };
    const newHistory = [...history, gameRecord];

    // Quick return check
    const hadQuick = history.length > 0 && (Date.now() - history[history.length-1].ts < 30*60*1000);
    const augmentedStats = calcStats(newHistory);
    if (hadQuick) augmentedStats.quickReturn = true;

    const { earned, newOnes } = checkTrophies(augmentedStats, trophies);

    setHistory(newHistory);
    setTrophies(earned);
    setResult({ results, times, picked });
    setNewTr(newOnes);
    setScreen("results");

    await Promise.all([S.set("gp-history", newHistory), S.set("gp-trophies", [...earned])]);
  };

  if (screen === "loading") return (
    <div className="gi-app" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <style>{css}</style>
      <div className="gi-stars"/>
      <div style={{fontSize:14,color:"rgba(200,168,75,.4)",letterSpacing:".2em"}}>LOADING…</div>
    </div>
  );

  return (
    <>
      <style>{css}</style>
      {screen === "setup"    && <SetupScreen onSave={saveProfile}/>}
      {screen === "home"     && <HomeScreen profile={profile} stats={stats} trophyCount={trophies.size} onPlay={startGame} onStats={()=>setScreen("stats")} onTrophies={()=>setScreen("trophies")} onEditProfile={()=>setScreen("setup")} onAdmin={()=>setScreen("admin")}/>}
      {screen === "playing"  && <GameScreen game={currentGame} profile={profile} logos={logos} onSaveLogo={saveLogo} onComplete={onGameComplete}/>}
      {screen === "results"  && <ResultsScreen game={currentGame} results={gameResult.results} times={gameResult.times} picked={gameResult.picked} profile={profile} stats={stats} newTrophies={newTrophies} logos={logos} onPlayAgain={startGame} onHome={()=>setScreen("home")}/>}
      {screen === "stats"    && <StatsScreen stats={stats} history={history} onBack={()=>setScreen("home")}/>}
      {screen === "trophies" && <TrophiesScreen earned={trophies} onBack={()=>setScreen("home")}/>}
      {screen === "admin"    && <AdminScreen logos={logos} onSaveLogo={saveLogo} onRemoveLogo={removeLogo} onBack={()=>setScreen("home")}/>}
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GolfIQ />);
  </script>
</body>
